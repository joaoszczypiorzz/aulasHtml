<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Forms </title>
  <style>

    body {
      background-color: #a4b0c7; 
    }

    h1#Tituloforms {
      text-align: center;
      color: rgb(48, 48, 129);
      font-size: 60px;
      text-shadow: 2px 1px black;
      font-family: "Playfair Display", serif;
      font-optical-sizing: auto;
      font-weight: 600;
      font-style: normal;
      margin-bottom: 30px;
      padding: 20px;
    }

    .container {
      width: 50%;
      height: 500px;
      margin: 40px auto; 
      background-color: white;
      border: 1px solid #ccc;
      border-radius: 15px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }

    form#formulario {
      display: flex;
      flex-direction: column;  
      padding: 20px;
      text-align: center;
      max-width: 400px;
      margin: 0 auto;
    }

    input {
      margin-top: auto;
      border: 1px border #ccc;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
      padding: 5px;
    }

  </style>
</head>
<body>
  
    <head>     
      <h1 id="Tituloforms"> Atividade Formulário </h1>
    </head>

    <main>

      <section>
        <div class="container">
        <form id="formulario">
          <label for="nomeCompleto"> Nome Completo </label>
            <input 
            type="text"
            id="nomeCompleto"
            name="nomeUsuario"
            >

          <label for="email">E-mail</label>

            <input
            type="email"
            id="email"
            name="usuarioEmail"
            >
          
          <label for="senhaConf">Senha</label>
            <input 
            type="password" 
            name="senha" 
            id="senhaConf"
            >  

          <label for="nascimento">Data Nascimento</label>
           <input 
           type="date" 
           name="dataNascimento" 
           id="nascimento"
           >  
          <label for="graduacao">Curso</label>
            <input 
            type="text" 
            name="cursos" 
            id="graduacao"
            > 

          <label for="interesses"> Interesses </label>
            <input 
            type="text"
            name="intere"
            id="interesses"
            >  

          <label for="sexo"> Sexo </label>
            <input 
              type="text"
              name="mas/fem"
              id="sexo"
              >  

           <label for="comentarios"> Comentários </label>
            <input
             type="text"
             name="comentarios"
             id="comentarios"
             >   

           <label for="img">Imagem para upload </label> 
            <input 
              type="image"
              name="campoImg"
              id="img"
              > 
        </form>
        </div>
      </section>

    </main>



</body>
</html>
